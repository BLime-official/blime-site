                        <div class="iteration-header">
                            <span class="iteration-name">1차 시도 (우선순위 5)</span>
                            <span class="iteration-stats">1227/1227 (100.0%)</span>
                        </div>
                        <div class="progress-bar small">
                            <div class="progress-fill primary" 
                                 style="width: 100.0%"></div>
                        </div>
                        <div class="iteration-details">
                            <span class="badge success">완료: 1227</span>
                            <span class="badge danger">실패: 0</span>
                            <span class="badge">대기: 0</span>
                        </div>
                    </div>
                    
                </div>
            </div>
            
            <div class="new-products-chart-panel">

                    <span class="chart-subtitle">일별 추가 상품 수</span>
                </div>
                <div class="chart-container">
                    <canvas id="newProductsChart"></canvas>
                </div>
            </div>

            마지막 업데이트: 2026-05-27 16:05:13
