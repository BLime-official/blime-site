<!-- 상품 요청 모달 -->
<div class="modal" id="requestModal">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3>상품 추가 요청</h3>
            <button class="modal-close" id="modalClose" aria-label="닫기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <p class="modal-description">
                추적하고 싶은 iHerb 상품의 URL을 입력해주세요.<br>
                <span class="request-guide-line">
                    상품의 공유 버튼을 통해 URL을 확인할 수 있습니다.
                    <button type="button" class="request-guide-toggle" id="requestGuideToggle" aria-expanded="false" aria-controls="requestGuidePanel">
                        방법 확인하기
                    </button>
                </span><br>
                다음 날부터 가격 추적이 시작됩니다.
            </p>
            <div class="request-guide-panel" id="requestGuidePanel" hidden>
                <div class="request-guide-image-wrap">
                    <img src="../assets/url-copy-method.png" alt="iHerb 상품 공유 버튼으로 URL을 복사하는 방법" class="request-guide-image" loading="eager">
                </div>
            </div>
            <form id="productRequestForm">
                <div class="form-group">
                    <label for="productUrl">상품 URL</label>
                    <input
                        type="text"
                        id="productUrl"
                        name="productUrl"
                        placeholder="iHerb 상품 링크(URL)를 입력하세요"
                        required
                        class="form-input"
                    />
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">취소</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span class="btn-text">요청하기</span>
                        <span class="btn-loading" style="display: none;">
                            <svg class="spinner" width="16" height="16" viewBox="0 0 24 24">
                                <circle class="spinner-circle" cx="12" cy="12" r="10" fill="none" stroke-width="3"></circle>
                            </svg>
                        </span>
                    </button>
                </div>
            </form>
            <div id="requestResult" class="request-result"></div>
        </div>
    </div>
</div>
